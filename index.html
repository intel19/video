<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Video Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="sidebar-title">Admin Panel</div>
            <nav class="sidebar-nav">
                <div class="nav-item active" data-section="search">
                    <span class="nav-icon">🔍</span>
                    Add Videos
                </div>
                <div class="nav-item" data-section="manage">
                    <span class="nav-icon">📹</span>
                    Manage Videos
                </div>
            </nav>
        </aside>
        <main class="main-content">
            <header class="main-header">
                <h1 id="main-title">YouTube Video Admin</h1>
            </header>
            <div id="notification" class="notification"></div>
            
            <!-- Add Videos Section -->
            <div id="search-section" class="content-section active">
                <!-- Manual Search Section -->
                <div class="section-header">
                    <h2>Manual Search</h2>
                </div>
                <div class="search-section">
                    <input type="text" id="keyword" placeholder="Enter keyword...">
                    <button id="searchBtn">Search</button>
                </div>
                <div id="results" class="results-section"></div>
                
                <!-- Bulk Upload Section -->
                <div class="section-header">
                    <h2>Bulk Upload</h2>
                </div>
                <div class="bulk-section">
                    <div class="bulk-keywords">
                        <label for="bulkKeywords">Enter keywords (one per line):</label>
                        <textarea id="bulkKeywords" placeholder="cat&#10;cat video&#10;cat entertainment video&#10;funny cats&#10;cute cats"></textarea>
                    </div>
                    <div class="bulk-options">
                        <div class="video-count-section">
                            <label for="videoCount">Videos to add per keyword:</label>
                            <select id="videoCount">
                                <option value="10">10 videos</option>
                                <option value="25">25 videos</option>
                                <option value="50">50 videos</option>
                                <option value="75">75 videos</option>
                                <option value="100">100 videos</option>
                            </select>
                        </div>
                        <button id="bulkUploadBtn" class="bulk-btn">Start Bulk Upload</button>
                    </div>
                    <div id="bulkProgress" class="bulk-progress"></div>
                </div>
            </div>

            <!-- Manage Videos Section -->
            <div id="manage-section" class="content-section">
                <div class="section-header">
                    <h2>Video Management</h2>
                    <div class="management-controls">
                        <div class="search-filter">
                            <input type="text" id="videoSearchInput" placeholder="Search videos...">
                            <button id="refreshVideosBtn" class="refresh-btn">🔄 Refresh</button>
                        </div>
                        <div class="video-stats">
                            <span id="videoCount">Total Videos: 0</span>
                        </div>
                    </div>
                </div>
                <div id="videosList" class="videos-list">
                    <div class="loading">Loading videos...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Video Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Video</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <form id="editVideoForm">
                    <input type="hidden" id="editVideoId">
                    <div class="form-group">
                        <label for="editTitle">Title:</label>
                        <input type="text" id="editTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="editUrl">YouTube URL:</label>
                        <input type="url" id="editUrl" required>
                    </div>
                    <div class="form-group">
                        <label for="editThumbnail">Thumbnail URL:</label>
                        <input type="url" id="editThumbnail">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-cancel">Cancel</button>
                        <button type="submit" class="btn-save">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Confirm Delete</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this video?</p>
                <div class="delete-video-info">
                    <strong id="deleteVideoTitle"></strong>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel">Cancel</button>
                    <button type="button" id="confirmDeleteBtn" class="btn-delete">Delete Video</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
